<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>クマ</title>
<style>
  :root{--bg:#070a09;--ink:#cdd8cf;--dim:#5d6f63;--faint:#222a25;--grn:#46e07a;--amb:#f2a23c;--red:#ff3b30;--wht:#eaf2ec}
  *{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg)}
  body{color:var(--ink);font:13px/1.5 "JetBrains Mono","Cascadia Mono",ui-monospace,monospace;
    letter-spacing:.05em;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.18) 2px 3px)}
  .unit{width:440px;max-width:100%;border:1px solid var(--faint);background:#0a0e0c;position:relative}
  .top{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;border-bottom:1px solid var(--faint)}
  .jp{font-family:"Yu Gothic","Hiragino Kaku Gothic Pro","MS Gothic",sans-serif}
  .mark{font-size:18px;letter-spacing:.1em;color:var(--wht)}
  #lv{font-size:11px;color:var(--grn);letter-spacing:.12em;margin-left:8px;text-shadow:0 0 6px rgba(70,224,122,.4)}
  .dot{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:6px}
  .dot i{width:7px;height:7px;background:var(--grn);box-shadow:0 0 7px var(--grn);animation:p 1.7s infinite}
  .dot.off i{background:var(--red);box-shadow:none;animation:none}
  @keyframes p{50%{opacity:.4}}
  .stage{padding:22px 18px 10px;display:flex;flex-direction:column;align-items:center;gap:14px}
  #bear{image-rendering:pixelated;height:188px;width:auto;max-width:220px}
  .say{font-size:14px;color:var(--ink);text-align:center;min-height:20px;letter-spacing:.04em}
  .say.hot{color:var(--red)}.say.warn{color:var(--amb)}
  .say b{color:var(--wht);font-weight:400}
  .bar{display:flex;border-top:1px solid var(--faint);font-size:11px}
  .bar div{flex:1;padding:7px 4px;text-align:center;border-right:1px solid var(--faint);color:var(--dim)}
  .bar div:last-child{border-right:0}
  .bar b{display:block;color:var(--ink);font-weight:400;font-size:13px;margin-top:2px;letter-spacing:.02em}
  .bar b.hot{color:var(--red)}.bar b.warn{color:var(--amb)}.bar b.ok{color:var(--grn)}
</style></head><body>
  <div class="unit">
    <div class="top"><div class="mark"><span class="jp">クマ</span><span id="lv">Lv 1</span></div>
      <div class="dot" id="dot"><i></i><span id="dtx">ONLINE</span></div></div>
    <div class="stage">
      <img id="bear" alt="KUMA">
      <div class="say" id="say">. . .</div>
    </div>
    <div class="bar">
      <div>THREAT<b id="th" class="ok">-</b></div>
      <div>UPTIME<b id="up">-</b></div>
      <div>EVENTS/10m<b id="ev">-</b></div>
      <div>NETWORKS<b id="nw">-</b></div>
      <div>SENSOR<b id="sn">-</b></div>
    </div>
  </div>
<script>
// ---- bear face (Jax's state portraits, one per bear_state) ------------
const BEAR_IMG=document.getElementById('bear');
const STATE_SPRITE={                      // bear_state -> state portrait
  sleeping:'01_hibernating', foraging:'02_foraging', honey_trap:'04_honey', honey:'04_honey',
  suspicious:'03_sentinel', alert:'06_alert', apex_ready:'05_apex', apex:'05_apex',
  investigating:'07_investigating', defending:'08_defending',
  attacking:'09_attacking', victory:'10_victory', error:'03_sentinel'};
const SPV='?v=4';  // bump to bust browser cache when sprites change
for(const k of Object.values(STATE_SPRITE)){const im=new Image();im.src='sprites/states/'+k+'.png'+SPV;}
function drawBear(state){
  const key=STATE_SPRITE[state]||STATE_SPRITE.error;
  if(!(BEAR_IMG.getAttribute('src')||'').includes(key))BEAR_IMG.src='sprites/states/'+key+'.png'+SPV;
}

// ---- live data -------------------------------------------------------
const SAMPLE={status:{version:"0.0.1",mode:"sentinel",threat_level:"low",bear_state:"foraging",events_last_10m:0,uptime_seconds:9123,wifi_interface:"wlan1mon",level:7,xp:194,network_count:42},events:[]};
const ATTACK={status:{mode:"sentinel",threat_level:"high",bear_state:"alert",events_last_10m:14,uptime_seconds:9240,wifi_interface:"wlan1mon",level:7,xp:194,network_count:42},events:[{event_type:"deauth_burst",severity:"high",channel:10,raw_json:{frame_count:1640}}]};
async function getData(){if(location.protocol==='file:'){const d=new Date();return (Math.floor(d.getSeconds()/6)%2)?ATTACK:SAMPLE;}
  try{const[s,e]=await Promise.all([fetch('/api/status',{cache:'no-store'}).then(r=>r.json()),fetch('/api/events?limit=20',{cache:'no-store'}).then(r=>r.json())]);return{status:s,events:e,live:true};}catch(_){return SAMPLE;}}
function hms(s){s=s||0;const p=n=>String(n).padStart(2,'0');return p(s/3600|0)+':'+p((s%3600)/60|0)+':'+p(s%60);}
const SEV={low:0,medium:1,high:2,critical:3};
function phrase(e){const t=e.event_type||'',r=e.raw_json||{};
  if(t.includes('deauth'))return ['deauth flood',e.channel?'ch'+e.channel:'',r.frame_count?r.frame_count+' frames':''].filter(Boolean).join(' · ');
  if(t.includes('disassoc'))return 'disassoc flood';
  if(t.includes('beacon'))return 'beacon flood';
  if(t.includes('twin')||t.includes('bssid')||t.includes('rogue'))return 'evil twin'+(e.ssid?' · '+e.ssid:'');
  if(t.includes('karma'))return 'karma / pineapple';
  if(t.includes('handshake'))return 'handshake harvest';
  if(t==='apex_response')return 'apex engaged';
  return e.message||t;}
async function render(){
  const d=await getData(),s=d.status,events=d.events||[],live=d.live!==false&&location.protocol!=='file:';
  const tl=s.threat_level||'low',hi=(tl==='high'||tl==='critical'),med=tl==='medium';
  drawBear(s.bear_state||'foraging');
  document.getElementById('dot').className='dot'+(live?'':' off');
  document.getElementById('dtx').textContent=live?'ONLINE':'DEMO';
  const th=document.getElementById('th');th.textContent=tl.toUpperCase();th.className=hi?'hot':med?'warn':'ok';
  document.getElementById('up').textContent=hms(s.uptime_seconds);
  document.getElementById('ev').textContent=s.events_last_10m;
  document.getElementById('nw').textContent=s.network_count!=null?s.network_count:'-';
  document.getElementById('sn').textContent=s.wifi_interface||'-';
  document.getElementById('lv').textContent='Lv '+(s.level||1);
  const say=document.getElementById('say');
  if(!events.length){say.textContent='all quiet';say.className='say';}
  else{const top=events.slice().sort((a,b)=>(SEV[b.severity]||0)-(SEV[a.severity]||0))[0];
    say.innerHTML='<b>'+phrase(top)+'</b>';
    say.className='say '+((top.severity==='high'||top.severity==='critical')?'hot':top.severity==='medium'?'warn':'');}
}
render();setInterval(render,2000);
</script></body></html>
