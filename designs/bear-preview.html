<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>クマ // KUMA</title>
<style>
  :root{--bg:#070a09;--ink:#cdd8cf;--dim:#6a7d70;--faint:#243029;--grn:#46e07a;--cy:#25d0ff}
  body{margin:0;background:#000;color:var(--ink);min-height:100vh;
    font:13px/1.6 "JetBrains Mono","Cascadia Mono",ui-monospace,monospace;
    display:flex;align-items:center;justify-content:center;padding:32px;letter-spacing:.04em}
  .hero{display:flex;gap:40px;align-items:center;flex-wrap:wrap;max-width:760px}
  .stage{border:1px solid var(--faint);position:relative;
    background:radial-gradient(120% 100% at 50% 25%,rgba(37,208,255,.07),transparent 60%),#0a0f0c;
    padding:30px 40px}
  .stage::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.16) 2px 3px)}
  .stage img{height:240px;width:auto;image-rendering:pixelated;display:block;
    animation:bob 2.6s ease-in-out infinite;filter:drop-shadow(0 8px 8px rgba(0,0,0,.5))}
  @keyframes bob{50%{transform:translateY(-7px)}}
  h1{font-weight:400;font-size:22px;letter-spacing:.2em;margin:0 0 2px}
  h1 .jp{color:var(--cy)}
  .tag{color:var(--grn);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:16px}
  p{color:var(--dim);max-width:300px}
  .links{margin-top:18px;font-size:11px}
  .links a{color:var(--cy);text-decoration:none;border-bottom:1px dotted var(--cy)}
</style></head><body>
<div class="hero">
  <div class="stage"><img src="sprites/sheet/00.png" alt="KUMA"></div>
  <div>
    <h1><span class="jp">クマ</span> KUMA</h1>
    <div class="tag">sentinel // always on guard</div>
    <p>A sentinel built for watching the grid. Calm, unwavering, always on guard.
    Protects, detects, endures.</p>
    <div class="links"><a href="sprites/showcase.html">full sprite sheet &rarr;</a>
    &nbsp;&nbsp;<a href="kuma-battle.html">battle demo &rarr;</a></div>
  </div>
</div>
</body></html>
