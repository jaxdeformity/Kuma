<!doctype html><html><head><meta charset="utf-8"><title>kuma cub</title>
<style>
  body{background:#cfe3ef;margin:0;padding:30px;font:12px ui-monospace,monospace;color:#456;
    display:flex;gap:24px;flex-wrap:wrap;align-items:flex-end}
  .cell{text-align:center}
  canvas{image-rendering:pixelated;width:256px;height:256px;background:#dfeef6;border:1px solid #9bb}
  .lbl{margin-top:8px;letter-spacing:.18em;text-transform:uppercase;font-size:11px}
</style></head><body>
<script>
// full-body sitting chibi cub, Pokemon/kawaii style. hand-authored sprite grid.
// .=empty o=outline B=fur b=fur-shadow T=belly/muzzle e=eye n=nose p=cheek w=shine
const ART=[
"................................",
".....oooo..........oooo.........",
"....oBBBBo........oBBBBo........",
"....oBbbBo........oBbbBo........",
"...oBBBBBBoo....ooBBBBBBo.......",
"..oBBBBBBBBBooooBBBBBBBBBo......",
".oBBBBBBBBBBBBBBBBBBBBBBBBo.....",
".oBBBBBBBBBBBBBBBBBBBBBBBBo.....",
"oBBBBBBBBBBBBBBBBBBBBBBBBBBo....",
"oBBBBBBBBBBBBBBBBBBBBBBBBBBo....",
"oBBBBBBweBBBBBBBBBBweBBBBBBo....",
"oBBBBBBeeBBBBBBBBBBeeBBBBBBo....",
"oBBBBppBBBBTTTTBBBBBppBBBBBo....",
"oBBBBppBBBTTnnTTBBBBppBBBBBo....",
".oBBBBBBBBTTnnTTBBBBBBBBBBo.....",
".oBBBBBBBBBTTTTBBBBBBBBBBo......",
"..oBBBBBBBBBBBBBBBBBBBBBBo......",
"...oBBBBBBBBBBBBBBBBBBBo........",
"....oBBBBBBBBBBBBBBBBBo.........",
".....oBBBBBBBBBBBBBBBo.........",
"....oBBBBBBBBBBBBBBBBBBo........",
"...oBBBBoTTTTTTTTooBBBBBo.......",
"..oBBBBoTTTTTTTTTToBBBBBBo......",
"..oBBBBoTTTTTTTTTToBBBBBBo......",
"..oBBBBoTTTTTTTTTToBBBBBBo......",
"..oBBBBBoTTTTTTTToBBBBBBBo......",
"..oBBBBBBoTTTTTToBBBBBBBBo......",
"...oBBBBBBBBBBBBBBBBBBBBo.......",
"..ooBBBoooBBBBBBoooBBBBoo.......",
".oBBBBBBoTToBBBBoTToBBBBBBo.....",
".oBBbbBBoTToBBBBoTToBBbbBBo.....",
"..oooooo..oooooo..oooooo......."
];
let CTX;const W=ART[0].length,H=ART.length;
function draw(threat,scale){
  const hi=(threat==='high'||threat==='critical'),med=(threat==='medium');
  const C={'.':null,o:'#3a2418',
    B:hi?'#a5552f':med?'#9c6f3c':'#9a6a3e',
    b:hi?'#7d3a20':med?'#6f4c28':'#754d2c',
    T:'#e6c89a', e:'#1a120c', n:'#1a120c', p:'#f0a0a8', w:'#fff'};
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const c=C[ART[y][x]];if(c){CTX.fillStyle=c;CTX.fillRect(x,y,1,1);}}
}
const cv=document.createElement('canvas');cv.width=W;cv.height=H;
CTX=cv.getContext('2d');draw('low');
const cell=document.createElement('div');cell.className='cell';
cell.appendChild(cv);const l=document.createElement('div');l.className='lbl';l.textContent='cub / calm';cell.appendChild(l);
document.body.appendChild(cell);
</script></body></html>
