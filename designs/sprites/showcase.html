<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>クマ // sprites</title>
<style>
  :root{--bg:#070a09;--ink:#cdd8cf;--dim:#6a7d70;--faint:#243029;--grn:#46e07a;--cy:#25d0ff}
  body{margin:0;background:#000;color:var(--ink);
    font:13px/1.5 "JetBrains Mono","Cascadia Mono",ui-monospace,monospace;padding:32px;letter-spacing:.04em}
  h1{font-weight:400;font-size:16px;letter-spacing:.2em;color:var(--grn);margin:30px 0 4px}
  h1:first-child{margin-top:0}
  .sub{color:var(--dim);margin-bottom:20px;max-width:640px}
  .strip{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end}
  .cell{border:1px solid var(--faint);background:
    radial-gradient(120% 100% at 50% 30%,rgba(37,208,255,.05),transparent 60%),#0a0f0c;
    padding:12px;text-align:center;position:relative}
  .cell::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.15) 2px 3px)}
  .cell img{image-rendering:pixelated;display:block;margin:0 auto}
  .anim img{height:104px;width:auto}
  .state img{height:120px;width:auto}
  .enemy img{height:96px;width:auto;max-width:150px}
  .lbl{margin-top:8px;letter-spacing:.16em;text-transform:uppercase;font-size:10px;color:var(--dim)}
</style></head><body>
<h1>クマ // ANIMATIONS</h1>
<div class="sub">Live frame loops sliced from Jax's animation sheet. 5 frames each.</div>
<div class="strip" id="anim"></div>

<h1>クマ // STATES</h1>
<div class="sub">KUMA's operational modes. Each maps to a bear_state the gadget reports.</div>
<div class="strip" id="states"></div>

<h1>クマ // THREATS</h1>
<div class="sub">The 10 hostiles KUMA hunts. Each maps to a real wireless/network attack.</div>
<div class="strip" id="enemies"></div>

<script>
const ACTIONS=['idle','walk','run','attack','special','hurt','guard','victory','ko','turn'];
const STATES=[['01_hibernating','hibernating'],['02_foraging','foraging'],['03_sentinel','sentinel'],
 ['04_honey','honey'],['05_apex','apex'],['06_alert','alert'],['07_investigating','investigating'],
 ['08_defending','defending'],['09_attacking','attacking'],['10_victory','victory']];
const ENEMIES=[['01_rogue_ap','rogue ap'],['02_evil_twin','evil twin'],['03_deauther','deauther'],
 ['04_pineapple','pineapple'],['05_beacon_flooder','beacon flooder'],['06_karma_lure','karma lure'],
 ['07_handshake_harvester','handshake harvester'],['08_sniffer','sniffer'],['09_rf_jammer','rf jammer'],
 ['10_botnet_worm','botnet worm']];

function cell(cls,imgHtml,label){const c=document.createElement('div');c.className='cell '+cls;
  c.innerHTML=imgHtml+'<div class="lbl">'+label+'</div>';return c;}

// preload every animation frame
for(const act of ACTIONS)for(let i=0;i<5;i++){const im=new Image();im.src='anim/'+act+'/'+i+'.png';}
// animations: cycle frames live
const a=document.getElementById('anim');
for(const act of ACTIONS){
  const c=cell('anim','<img>',act);a.appendChild(c);
  const img=c.querySelector('img');img.src='anim/'+act+'/0.png';let i=0;
  setInterval(()=>{img.src='anim/'+act+'/'+i+'.png';i=(i+1)%5;}, act==='idle'?200:130);
}
const s=document.getElementById('states');
for(const [id,name] of STATES)s.appendChild(cell('state','<img src="states/'+id+'.png">',name));
const e=document.getElementById('enemies');
for(const [id,name] of ENEMIES)e.appendChild(cell('enemy','<img src="enemies/'+id+'.png">',name));
</script></body></html>
