<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>クマ</title>
<style>
  :root{--bg:#070a09;--ink:#cdd8cf;--dim:#5d6f63;--faint:#222a25;--grn:#46e07a;--amb:#f2a23c;--red:#ff3b30;--wht:#eaf2ec}
  *{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg)}
  body{color:var(--ink);font:13px/1.5 "JetBrains Mono","Cascadia Mono",ui-monospace,monospace;
    letter-spacing:.05em;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:18px}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9;
    background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(0,0,0,.18) 2px 3px)}
  .unit{width:440px;max-width:100%;border:1px solid var(--faint);background:#0a0e0c;position:relative}
  .top{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;border-bottom:1px solid var(--faint)}
  .jp{font-family:"Yu Gothic","Hiragino Kaku Gothic Pro","MS Gothic",sans-serif}
  .mark{font-size:18px;letter-spacing:.1em;color:var(--wht)}
  .dot{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:6px}
  .dot i{width:7px;height:7px;background:var(--grn);box-shadow:0 0 7px var(--grn);animation:p 1.7s infinite}
  .dot.off i{background:var(--red);box-shadow:none;animation:none}
  @keyframes p{50%{opacity:.4}}
  .stage{padding:24px 18px 10px;display:flex;flex-direction:column;align-items:center;gap:14px}
  canvas{image-rendering:pixelated;width:208px;height:208px}
  .say{font-size:14px;color:var(--ink);text-align:center;min-height:20px;letter-spacing:.04em}
  .say.hot{color:var(--red)}.say.warn{color:var(--amb)}
  .say b{color:var(--wht);font-weight:400}
  .bar{display:flex;border-top:1px solid var(--faint);font-size:11px}
  .bar div{flex:1;padding:7px 4px;text-align:center;border-right:1px solid var(--faint);color:var(--dim)}
  .bar div:last-child{border-right:0}
  .bar b{display:block;color:var(--ink);font-weight:400;font-size:13px;margin-top:2px;letter-spacing:.02em}
  .bar b.hot{color:var(--red)}.bar b.warn{color:var(--amb)}.bar b.ok{color:var(--grn)}
</style></head><body>
  <div class="unit">
    <div class="top"><div class="mark"><span class="jp">クマ</span></div>
      <div class="dot" id="dot"><i></i><span id="dtx">ONLINE</span></div></div>
    <div class="stage">
      <canvas id="bear" width="24" height="24"></canvas>
      <div class="say" id="say">. . .</div>
    </div>
    <div class="bar">
      <div>THREAT<b id="th" class="ok">-</b></div>
      <div>UPTIME<b id="up">-</b></div>
      <div>EVENTS/10m<b id="ev">-</b></div>
      <div>SENSOR<b id="sn">-</b></div>
    </div>
  </div>
<script>
const W=24;let CTX;
function px(x,y,c){if(x<0||y<0||x>=W||y>=W||!c)return;CTX.fillStyle=c;CTX.fillRect(x|0,y|0,1,1);}
function tri(x0,y0,x1,y1,x2,y2,c){const mnx=Math.min(x0,x1,x2),mxx=Math.max(x0,x1,x2),mny=Math.min(y0,y1,y2),mxy=Math.max(y0,y1,y2);for(let y=mny;y<=mxy;y++)for(let x=mnx;x<=mxx;x++){const w0=(x1-x)*(y2-y)-(x2-x)*(y1-y),w1=(x2-x)*(y0-y)-(x0-x)*(y2-y),w2=(x0-x)*(y1-y)-(x1-x)*(y0-y);if((w0>=0&&w1>=0&&w2>=0)||(w0<=0&&w1<=0&&w2<=0))px(x,y,c);}}
const BODY=["........................","....ooo......ooo........","...o###o....o###o......","...o####o..o####o.......","..o######oo######o......",".o################o....",".o################o....","o##################o...","o##################o...","o##################o...","o##################o...","o##################o...",".o################o....",".o#####mmmmmmmm###o....",".o####mmmmmmmmmm##o....","..o##mmmmmnnmmmmm#o....","..o##mmmmmnnmmmmm#o....","...o#mmmmmmmmmmm#o.....","....o#mmmmmmmmm#o......",".....o#########o.......","......oo#####oo........",".......ooooooo........."];
function paint(threat){const hi=(threat==='high'||threat==='critical'),med=(threat==='medium');
  const C={o:'#1a130d','#':hi?'#a8553a':med?'#977040':'#8a7053',':':hi?'#7a3826':med?'#664a28':'#5e4c39',m:'#ddd3bb',n:'#140f0a'};
  for(let y=0;y<BODY.length;y++)for(let x=0;x<BODY[y].length;x++){let ch=BODY[y][x];if(ch==='#'&&(y>16||x>15))ch=':';px(x,y,C[ch]);}}
const EL=6,ER=15,EY=10;
function drawBear(ctx,state,threat){CTX=ctx;CTX.clearRect(0,0,W,W);
  const hi=(threat==='high'||threat==='critical'),med=(threat==='medium'),demon=(state==='alert'||state==='apex');
  const out='#1a130d',white='#f4f2ea',nose='#140f0a',fang='#f6f2e6',red='#e23a26',horn='#e7dcc2';
  const glow=state==='alert'?'#ff3a2a':(state==='apex'?'#ff7a3a':hi?'#ff9a40':med?'#ffd24a':null);
  if(demon){tri(5,4,8,4,5,0,horn);tri(16,4,13,4,16,0,horn);px(5,4,out);px(8,4,out);px(16,4,out);px(13,4,out);}
  paint(threat);
  function roundEye(cx){for(const[dx,dy]of[[0,-1],[-1,0],[0,0],[1,0],[0,1]])px(cx+dx,EY+dy,nose);px(cx-1,EY-1,nose);px(cx+1,EY-1,nose);px(cx-1,EY+1,nose);px(cx+1,EY+1,nose);px(cx-1,EY-1,white);if(glow)px(cx,EY,glow);}
  function slit(cx){for(let i=-1;i<=1;i++)px(cx+i,EY,glow||'#cdd5c6');px(cx,EY,nose);}
  function angry(cx,s){for(let i=0;i<3;i++){px(cx-1+i,EY+(s>0?i:(2-i)),glow);px(cx-1+i,EY+1+(s>0?i:(2-i)),glow);}px(cx,EY,nose);px(cx-1*s,EY-1,out);}
  if(state==='sleeping'){for(const cx of[EL,ER]){px(cx-1,EY,out);px(cx,EY+1,out);px(cx+1,EY,out);}}
  else if(state==='error'){for(const cx of[EL,ER]){px(cx-1,EY-1,'#9a9a9a');px(cx+1,EY+1,'#9a9a9a');px(cx+1,EY-1,'#9a9a9a');px(cx-1,EY+1,'#9a9a9a');px(cx,EY,'#9a9a9a');}}
  else if(state==='suspicious'){slit(EL);slit(ER);px(EL-2,EY-2,out);px(EL-1,EY-1,out);px(ER+2,EY-2,out);px(ER+1,EY-1,out);}
  else if(demon){angry(EL,1);angry(ER,-1);for(let t=0;t<2;t++){px(EL-2+t,EY-2,out);px(EL+1+t,EY-1,out);px(ER+1-t,EY-2,out);px(ER-2+t,EY-1,out);}}
  else if(state==='honey'){for(const cx of[EL,ER]){px(cx-1,EY,out);px(cx+1,EY,out);px(cx,EY,'#ffd24a');}}
  else{roundEye(EL);roundEye(ER);}
  const MX=10,MY=18;
  if(demon){for(let x=MX-3;x<=MX+3;x++)px(x,MY-1,out);for(let x=MX-2;x<=MX+2;x++)px(x,MY,nose);tri(MX-3,MY-1,MX-1,MY-1,MX-2,MY-3,fang);tri(MX+1,MY-1,MX+3,MY-1,MX+2,MY-3,fang);px(7,7,red);px(8,8,red);px(9,9,red);px(10,10,red);}
  else if(state==='sleeping'){px(MX-1,MY-1,out);px(MX,MY,out);px(MX+1,MY-1,out);}
  else if(state==='honey'){px(MX-2,MY,out);px(MX-1,MY,out);px(MX,MY-1,out);px(MX+1,MY-1,out);}
  else if(state==='error'){px(MX-2,MY-1,out);px(MX-1,MY,out);px(MX,MY-1,out);px(MX+1,MY,out);px(MX+2,MY-1,out);}
  else{px(MX-2,MY-1,out);px(MX-1,MY,out);px(MX,MY,out);px(MX+1,MY,out);px(MX+2,MY-1,out);}
}
const SAMPLE={status:{version:"0.0.1",mode:"sentinel",threat_level:"low",bear_state:"foraging",events_last_10m:0,uptime_seconds:9123,wifi_interface:"wlan1mon"},events:[]};
const ATTACK={status:{mode:"sentinel",threat_level:"high",bear_state:"alert",events_last_10m:14,uptime_seconds:9240,wifi_interface:"wlan1mon"},events:[{event_type:"deauth_burst",severity:"high",channel:10,raw_json:{frame_count:1640}}]};
async function getData(){if(location.protocol==='file:'){const d=new Date();return (Math.floor(d.getSeconds()/6)%2)?ATTACK:SAMPLE;}
  try{const[s,e]=await Promise.all([fetch('/api/status',{cache:'no-store'}).then(r=>r.json()),fetch('/api/events?limit=20',{cache:'no-store'}).then(r=>r.json())]);return{status:s,events:e,live:true};}catch(_){return SAMPLE;}}
function hms(s){s=s||0;const p=n=>String(n).padStart(2,'0');return p(s/3600|0)+':'+p((s%3600)/60|0)+':'+p(s%60);}
const SEV={low:0,medium:1,high:2,critical:3};
function phrase(e){const t=e.event_type||'',r=e.raw_json||{};
  if(t.includes('deauth'))return ['deauth flood',e.channel?'ch'+e.channel:'',r.frame_count?r.frame_count+' frames':''].filter(Boolean).join(' · ');
  if(t.includes('beacon'))return 'beacon flood';
  if(t.includes('twin')||t.includes('bssid')||t.includes('rogue'))return 'evil twin'+(e.ssid?' · '+e.ssid:'');
  if(t.includes('karma'))return 'karma / pineapple';
  if(t.includes('handshake'))return 'handshake harvest';
  if(t==='apex_response')return 'apex engaged';
  return e.message||t;}
const bc=document.getElementById('bear').getContext('2d');
async function render(){
  const d=await getData(),s=d.status,events=d.events||[],live=d.live!==false&&location.protocol!=='file:';
  const tl=s.threat_level||'low',hi=(tl==='high'||tl==='critical'),med=tl==='medium';
  drawBear(bc,s.bear_state||'foraging',tl);
  document.getElementById('dot').className='dot'+(live?'':' off');
  document.getElementById('dtx').textContent=live?'ONLINE':'DEMO';
  const th=document.getElementById('th');th.textContent=tl.toUpperCase();th.className=hi?'hot':med?'warn':'ok';
  document.getElementById('up').textContent=hms(s.uptime_seconds);
  document.getElementById('ev').textContent=s.events_last_10m;
  document.getElementById('sn').textContent=s.wifi_interface||'-';
  const say=document.getElementById('say');
  if(!events.length){say.textContent='all quiet';say.className='say';}
  else{const top=events.slice().sort((a,b)=>(SEV[b.severity]||0)-(SEV[a.severity]||0))[0];
    say.innerHTML='<b>'+phrase(top)+'</b>';
    say.className='say '+((top.severity==='high'||top.severity==='critical')?'hot':top.severity==='medium'?'warn':'');}
}
render();setInterval(render,2000);
</script></body></html>
