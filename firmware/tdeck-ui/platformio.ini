; KUMA Guard — LilyGo T-Deck (Plus) UI client.
; The T-Deck is KUMA's flagship FACE: ESP32-S3 + keyboard + trackball + 2.8"
; ST7789. It polls the Pi backend over HTTP and renders the bear. No capture.
;
; Flash:  pio run -e t-deck -t upload
; Monitor: pio device monitor -b 115200
;
; Hardware pins are from LilyGo's repo (Xinyuan-LilyGO/T-Deck, UnitTest/utilities.h).

[env:t-deck]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; T-Deck = 16MB flash, 8MB OPI PSRAM, native USB-CDC.
board_build.mcu = esp32s3
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    bblanchon/ArduinoJson@^7.0
