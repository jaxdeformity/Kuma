; KUMA Guard — M5Core (M5Stack Core BASIC, ESP32) UI client.
; The M5Core is the FACE: it polls the Pi backend over HTTP and renders the
; bear. It does NO packet capture.
;
; Flash:  pio run -t upload
; Monitor: pio device monitor

[env:m5stack-core-esp32]
platform = espressif32
board = m5stack-core-esp32
framework = arduino
monitor_speed = 115200
lib_deps =
    m5stack/M5Unified@^0.1.16   ; display + buttons (M5GFX under the hood)
    bblanchon/ArduinoJson@^7.0  ; parse /api/status + /api/events
build_flags =
    -DCORE_DEBUG_LEVEL=1
